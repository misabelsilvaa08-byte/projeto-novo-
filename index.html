        <!-- bloco extra tipo app--><!DOCTYPE html> <!-- Define que o documento é HTML5-->
<html lang="pt-br"> <!-- Define q idioma da página-->

<head> <!-- Cabeçalho da página, não aparece visualmente-->

<meta charset="UTF-8"> <!--Permite acentuação correta-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco Dev</title> <!--Título da aba do navegador-->

<!-- Conecta o arquivo CSS ao HTML-->
<link rel="stylesheet" href="style.css">
</head>

<body> <!--Tudo que aparece na tela fica aqui-->

<!-- Container principal que centraliza e orgraniza todo o conteúdo-->

<div class="container"> <!--Agrupa tudo como se fosse um celular-->

<!-- Bloco 1: Topo-->

<div class="topo"><!--Div = caixa / bloco generico-->
<h2>Banco Dev</h2> <!--Mais cara de APP-->
<p>Bem vindo, Maria</p> <!-- Descrição-->
</div>



<!-- Bloco 2: Saldo-->
<div class="saldo">
<spam>saldo</spam><!--melhora o alinhamento-->
<h2>R$ 2.000,00</h2><!--Valor em Descrição-->
</div>

<!-- Bloco 3: Ações-->
<div class="acoes">

<button>Transferir</button>
<button>Pagar</button>
<button>Extrato</button>
</div>

<!-- Bloco 4: Transações-->
<div class="transacoes">
       <!--Cada transação virou um bloco separado-->
<div class="item">
    <span>Pix Enviado</span>
    <span>- R$100,00</span>
</div>

<!-- segunda transaçao-->
<div class="item"> 
    <Span> boleto pago</Span> <!-- descrição -->
    <span>- R$200</span> <!-- valor -->
    </div>

    <!-- terceira transaçao-->
    <div class="item"> 
        <span> transferencia recebida</span> <!--descriçao--> 
        <span>+ R$500</span> <!--valor--> 
        </div> 

        <!--bloco extra tipo app--> 
<div class="item">
    <span>Boleto pago</span>
<div class="card">
    <P>Cartão de crédito</P>
    <h3> R$ 50.000,00</h3>
</div>

<!-- Final do container-->
</div>

<!--bloco extra com dica visual--> 
<div class="card inteligente">
 <p>dica inteligente </p><!--titulo--> 
 <h3> voce gastou menos essa semana</h3><!--mensagem--> 
 <span> continue economizando</span><!--texto de apoio-->
</div>
<body>
</html>
